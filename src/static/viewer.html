<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The World - Dwarf Fortress Style</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Courier New', monospace; 
            background: #0a0a0f; 
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: #1a1a2e;
            padding: 15px 20px;
            border-bottom: 2px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title { font-size: 24px; color: #ffaa00; }
        .controls button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            margin-left: 10px;
            cursor: pointer;
            font-family: inherit;
        }
        .controls button:hover { background: #444; }
        .controls button.active { background: #ffaa00; color: #000; }
        
        .main {
            display: flex;
            height: calc(100vh - 70px);
        }
        
        #game-view {
            flex: 1;
            position: relative;
            background: #0d0d12;
        }
        #game-canvas {
            width: 100%;
            height: 100%;
        }
        
        .sidebar {
            width: 320px;
            background: #12121a;
            border-left: 2px solid #333;
            padding: 15px;
            overflow-y: auto;
        }
        
        .stat-box {
            background: #1a1a2e;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #333;
        }
        .stat-label { color: #888; font-size: 11px; }
        .stat-value { font-size: 16px; color: #ffaa00; }
        .stat-value.green { color: #00ff88; }
        .stat-value.red { color: #ff4444; }
        
        .events {
            background: #0d0d12;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            font-size: 11px;
            border: 1px solid #333;
        }
        .event { margin-bottom: 4px; color: #888; }
        .event.birth { color: #00ff88; }
        .event.death { color: #ff4444; }
        
        .legend { margin-top: 10px; }
        .legend h3 { color: #888; font-size: 12px; margin-bottom: 5px; }
        .legend-item { display: flex; align-items: center; margin: 3px 0; font-size: 11px; }
        .legend-symbol { width: 20px; text-align: center; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">⛏️ The World - Dwarf Fortress Style</div>
    </div>
    
    <div class="main">
        <div id="game-view">
            <canvas id="game-canvas"></canvas>
        </div>
        <div class="sidebar">
            <div class="stat-box">
                <div class="stat-label">POPULATION</div>
                <div class="stat-value" id="population">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">GENERATION</div>
                <div class="stat-value" id="generation">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">AVG HAPPINESS</div>
                <div class="stat-value" id="happiness">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">TOTAL JOBS DONE</div>
                <div class="stat-value green" id="jobs">0</div>
            </div>
            
            <div class="stat-box">
                <div class="stat-label">JOBS</div>
                <div id="job-dist"></div>
            </div>
            
            <div class="stat-box">
                <div class="stat-label">EVENTS</div>
                <div class="events" id="events"></div>
            </div>
            
            <div class="legend">
                <h3>SYMBOLS</h3>
                <div class="legend-item"><span class="legend-symbol">@</span> Agent</div>
                <div class="legend-item"><span class="legend-symbol">♦</span> Food</div>
                <div class="legend-item"><span class="legend-symbol">♣</span> Wood</div>
                <div class="legend-item"><span class="legend-symbol">▲</span> Stone</div>
                <div class="legend-item"><span class="legend-symbol">●</span> Ore</div>
                <div class="legend-item"><span class="legend-symbol">□</span> Shelter</div>
                <div class="legend-item"><span class="legend-symbol">≈</span> Water</div>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            updateDisplay(data);
        };
        
        ws.onclose = () => {
            document.getElementById('events').innerHTML = '<div class="event">Disconnected</div>';
        };
        
        function updateDisplay(data) {
            const civ = data.civilization || {};
            const world = data.world || {};
            const agents = data.agents || [];
            
            // Update stats
            document.getElementById('population').textContent = civ.population || 0;
            document.getElementById('generation').textContent = civ.generation || 1;
            
            const hap = civ.avg_happiness || 0;
            const hapEl = document.getElementById('happiness');
            hapEl.textContent = hap.toFixed(1);
            hapEl.className = 'stat-value ' + (hap > 50 ? 'green' : hap < 30 ? 'red' : '');
            
            document.getElementById('jobs').textContent = civ.total_jobs_done || 0;
            
            // Job distribution
            const jobs = civ.jobs || {};
            let jobHtml = '';
            for (const [job, count] of Object.entries(jobs)) {
                jobHtml += `<div>${job}: ${count}</div>`;
            }
            document.getElementById('job-dist').innerHTML = jobHtml || 'None';
            
            // Events
            const events = world.events || [];
            let eventsHtml = '';
            events.slice(-10).forEach(e => {
                const isBirth = e.message.includes('Born') || e.message.includes('arrival');
                const isDeath = e.message.includes('died');
                eventsHtml += `<div class="event ${isBirth ? 'birth' : ''} ${isDeath ? 'death' : ''}">${e.message}</div>`;
            });
            document.getElementById('events').innerHTML = eventsHtml;
            
            // Render
            render(data);
        }
        
        function render(data) {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            
            const W = canvas.width;
            const H = canvas.height;
            const scale = W / 1200;
            
            // Background
            ctx.fillStyle = '#0d0d12';
            ctx.fillRect(0, 0, W, H);
            
            const world = data.world || {};
            const agents = data.agents || [];
            
            // Water sources
            (world.water_sources || []).forEach(w => {
                const wx = w.x * scale;
                const wy = H - w.y * scale;
                const wr = w.radius * scale;
                
                const grad = ctx.createRadialGradient(wx, wy, 0, wx, wy, wr);
                grad.addColorStop(0, 'rgba(50, 100, 200, 0.5)');
                grad.addColorStop(1, 'rgba(50, 100, 200, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(wx, wy, wr, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Resources
            const symbols = { food: '♦', wood: '♣', stone: '▲', ore: '●' };
            const colors = { food: '#00ff88', wood: '#8B4513', stone: '#888888', ore: '#CD853F' };
            (world.resources || []).forEach(r => {
                const rx = r.x * scale;
                const ry = H - r.y * scale;
                
                ctx.fillStyle = colors[r.type] || '#fff';
                ctx.font = '14px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(symbols[r.type] || '?', rx, ry);
            });
            
            // Buildings
            (world.buildings || []).forEach(b => {
                const bx = b.x * scale;
                const by = H - b.y * scale;
                const bs = (b.size || 10) * scale;
                
                if (b.type === 'shelter') {
                    ctx.fillStyle = '#4444aa';
                    ctx.fillRect(bx - bs/2, by - bs/2, bs, bs);
                    ctx.strokeStyle = '#6666ff';
                    ctx.strokeRect(bx - bs/2, by - bs/2, bs, bs);
                } else if (b.type === 'farm') {
                    ctx.fillStyle = '#228B22';
                    ctx.fillRect(bx - bs/2, by - bs/2, bs, bs);
                }
            });
            
            // Agents
            agents.forEach(a => {
                const ax = a.position.x * scale;
                const ay = H - a.position.y * scale;
                
                // Color based on happiness
                const hap = a.needs.happiness;
                if (hap > 70) ctx.fillStyle = '#00ff88';
                else if (hap < 30) ctx.fillStyle = '#ff4444';
                else ctx.fillStyle = '#ffaa00';
                
                ctx.font = 'bold 16px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('@', ax, ay);
                
                // Job label
                ctx.fillStyle = '#888';
                ctx.font = '8px monospace';
                ctx.fillText(a.job.charAt(0).toUpperCase(), ax + 8, ay - 8);
            });
        }
        
        // Resize handler
        window.onresize = () => {
            // Will re-render on next message
        };
    </script>
</body>
</html>
