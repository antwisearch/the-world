<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The World - ASCII</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: #ccc;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        #ascii {
            white-space: pre;
            font-size: 12px;
            line-height: 12px;
            background: #0a0a0a;
            padding: 10px;
            border: 1px solid #333;
        }
        .header {
            background: #1a1a1a;
            padding: 10px 20px;
            border-bottom: 2px solid #333;
            display: flex;
            justify-content: space-between;
        }
        .title { font-size: 18px; color: #ffaa00; }
        .sidebar {
            width: 300px;
            background: #111;
            border-left: 2px solid #333;
            padding: 10px;
            font-size: 11px;
        }
        .main { display: flex; height: calc(100vh - 60px); }
        .stat-box {
            background: #1a1a1a;
            padding: 8px;
            margin-bottom: 8px;
            border: 1px solid #333;
        }
        .stat-label { color: #666; font-size: 10px; }
        .stat-value { color: #ffaa00; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">⛏️ The World - Dwarf Fortress ASCII</div>
    </div>
    <div class="main">
        <div id="ascii"></div>
        <div class="sidebar">
            <div class="stat-box">
                <div class="stat-label">POPULATION</div>
                <div class="stat-value" id="population">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">GENERATION</div>
                <div class="stat-value" id="generation">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">HAPPINESS</div>
                <div class="stat-value" id="happiness">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">EVENTS</div>
                <div id="events"></div>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            updateDisplay(data);
        };
        
        function updateDisplay(data) {
            const civ = data.civilization || {};
            const world = data.world || {};
            const agents = data.agents || [];
            
            // Stats
            document.getElementById('population').textContent = civ.population || 0;
            document.getElementById('generation').textContent = civ.generation || 1;
            document.getElementById('happiness').textContent = (civ.avg_happiness || 0).toFixed(1);
            
            // Events
            const events = world.events || [];
            let eventsHtml = events.slice(-5).map(e => 
                `<div style="color:#666;margin:2px 0;">${e.message}</div>`
            ).join('');
            document.getElementById('events').innerHTML = eventsHtml;
            
            // Render ASCII
            renderASCII(data);
        }
        
        function renderASCII(data) {
            const W = 80, H = 40;
            const world = data.world || {};
            const agents = data.agents || [];
            const resources = world.resources || [];
            const buildings = world.buildings || [];
            const water = world.water_sources || [];
            
            // Create grid
            let grid = [];
            for (let y = 0; y < H; y++) {
                grid[y] = [];
                for (let x = 0; x < W; x++) {
                    grid[y][x] = '.';
                }
            }
            
            // Helper: world to screen
            const wx = (wx) => Math.floor(wx / 1200 * W);
            const wy = (wy) => Math.floor((800 - wy) / 800 * H);
            
            // Draw water
            water.forEach(w => {
                for (let dy = -3; dy <= 3; dy++) {
                    for (let dx = -5; dx <= 5; dx++) {
                        const sx = wx(w.x) + dx;
                        const sy = wy(w.y) + dy;
                        if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
                            grid[sy][sx] = '~';
                        }
                    }
                }
            });
            
            // Draw resources
            resources.forEach(r => {
                const sx = wx(r.x);
                const sy = wy(r.y);
                if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
                    const symbols = { food: '*', wood: 'T', stone: 'O', ore: '#' };
                    grid[sy][sx] = symbols[r.type] || '.';
                }
            });
            
            // Draw buildings
            buildings.forEach(b => {
                const sx = wx(b.x);
                const sy = wy(b.y);
                if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
                    const symbols = { shelter: 'H', farm: 'F', workshop: 'W' };
                    grid[sy][sx] = symbols[b.type] || 'B';
                }
            });
            
            // Draw agents
            agents.forEach(a => {
                const sx = wx(a.position.x);
                const sy = wy(a.position.y);
                if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
                    // Color by job
                    const jobChars = { 
                        gatherer: 'g', builder: 'b', hunter: 'h', 
                        farmer: 'f', trader: 't', guard: 'G' 
                    };
                    grid[sy][sx] = jobChars[a.job] || '@';
                }
            });
            
            // Build string
            let output = '';
            
            // Top bar - climate zones
            output += '┌' + '─'.repeat(W) + '┐\n';
            
            for (let y = 0; y < H; y++) {
                output += '│';
                for (let x = 0; x < W; x++) {
                    output += grid[y][x];
                }
                output += '│\n';
            }
            
            // Bottom bar
            output += '└' + '─'.repeat(W) + '┘';
            
            document.getElementById('ascii').textContent = output;
        }
        
        ws.onclose = () => {
            document.getElementById('ascii').textContent = 'DISCONNECTED';
        };
    </script>
</body>
</html>
