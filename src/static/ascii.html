<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The World - Dwarf Fortress</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: #aaa;
            font-family: 'Courier New', monospace;
            padding: 10px;
            font-size: 11px;
        }
        #game {
            white-space: pre;
            background: #111;
            padding: 5px;
            border: 1px solid #444;
            display: inline-block;
            line-height: 11px;
        }
        .header {
            padding: 5px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title { color: #ffaa00; font-size: 14px; }
        .info { color: #666; font-size: 10px; }
        .main { display: flex; gap: 15px; }
        .sidebar { width: 220px; vertical-align: top; }
        .stat-box {
            background: #0a0a0a;
            padding: 5px;
            margin-bottom: 5px;
            border: 1px solid #222;
        }
        .stat-label { color: #555; font-size: 9px; }
        .stat-value { color: #888; }
        .stat-value.good { color: #0a0; }
        .stat-value.bad { color: #a00; }
        .events {
            height: 200px;
            overflow-y: auto;
            font-size: 9px;
            background: #0a0a0a;
            padding: 5px;
            border: 1px solid #222;
        }
        .event { color: #444; margin: 1px 0; }
        .event.birth { color: #0a0; }
        .event.death { color: #a00; }
        .event.build { color: #0aa; }
        .event.trade { color: #aa0; }
        .event.season { color: #0af; }
        .event.weather { color: #aaf; }
        .legend {
            font-size: 9px;
            background: #0a0a0a;
            padding: 5px;
            border: 1px solid #222;
        }
        .legend-title { color: #555; margin-bottom: 3px; }
        .c-water { color: #00aaff; }
        .c-tree { color: #00ff00; }
        .c-food { color: #ffaa00; }
        .c-agent { color: #ff66ff; }
    </style>
</head>
<body>
    <div class="header">
        <span class="title">⛏ THE WORLD - Dwarf Fortress Style</span>
        <span class="info"><a href="/player" style="color:#ffd700">👤 My Agent</a> | <a href="/chronicle" style="color:#4fc3f7">📖 Chronicle</a> | <span id="status">Loading...</span></span>
    </div>
    <div class="main">
        <div id="game">Connecting...</div>
        <div class="sidebar">
            <div class="stat-box">
                <div class="stat-label">POPULATION</div>
                <div class="stat-value" id="pop">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">HAPPINESS</div>
                <div class="stat-value" id="hap">0%</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">JOBS DONE</div>
                <div class="stat-value" id="jobs">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">RESOURCES</div>
                <div class="stat-value" id="resources">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">SEASON</div>
                <div class="stat-value" id="season">?</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">EVENT LOG</div>
                <div class="events" id="events"></div>
            </div>
        </div>
    </div>

    <script>
        // Poll for data every second
        function poll() {
            fetch('/poll')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('status').textContent = 'Connected';
                    update(data);
                })
                .catch(e => {
                    document.getElementById('status').textContent = 'Error: ' + e.message;
                });
        }
        
        function update(data) {
            const civ = data.civilization || {};
            const world = data.world || {};
            const agents = data.agents || [];
            
            // Stats
            document.getElementById('pop').textContent = civ.population || 0;
            document.getElementById('hap').textContent = (civ.avg_happiness || 0).toFixed(1) + '%';
            document.getElementById('jobs').textContent = civ.total_jobs_done || 0;
            document.getElementById('resources').textContent = (world.resources || []).length;
            
            // Season
            const seasonIcons = {'spring': '🌸', 'summer': '☀️', 'autumn': '🍂', 'winter': '❄️'};
            const season = (world.seasons || {}).season || 'spring';
            document.getElementById('season').textContent = (seasonIcons[season] || '🌸') + ' ' + season;
            
            // Events
            const events = world.events || [];
            let html = events.slice(-20).reverse().map(e => {
                let cls = 'event';
                if (e.message && e.message.match(/Born|arrival/i)) cls += ' birth';
                else if (e.message && e.message.match(/died/i)) cls += ' death';
                else if (e.message && e.message.match(/built|construct/i)) cls += ' build';
                return '<div class="' + cls + '">' + (e.message || '') + '</div>';
            }).join('');
            document.getElementById('events').innerHTML = html || '<div class="event">No events yet</div>';
            
            // Render game map
            render(data);
        }
        
        function render(data) {
            const W = 80, H = 25;
            const world = data.world || {};
            const agents = data.agents || [];
            const resources = world.resources || [];
            const water = world.water_sources || [];
            
            let g = [];
            for (let y = 0; y < H; y++) {
                g[y] = Array(W).fill(' ');
            }
            
            const wx = x => Math.floor(x / 1200 * W);
            const wy = y => Math.floor((800 - y) / 800 * H);
            
            // Water
            water.forEach(w => {
                for (let dy = -5; dy <= 5; dy++) {
                    for (let dx = -10; dx <= 10; dx++) {
                        const sx = wx(w.x) + dx;
                        const sy = wy(w.y) + dy;
                        if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
                            if (Math.sqrt(dx*dx + dy*dy) < 5) g[sy][sx] = '~';
                        }
                    }
                }
            });
            
            // Resources
            resources.forEach(r => {
                const sx = wx(r.x), sy = wy(r.y);
                if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
                    if (r.type === 'wood') g[sy][sx] = 'T';
                    else if (r.type === 'food') g[sy][sx] = '*';
                    else if (r.type === 'ore') g[sy][sx] = '#';
                    else if (r.type === 'stone') g[sy][sx] = 'O';
                }
            });
            
            // Agents
            agents.forEach(a => {
                const pos = a.position || {x: 0, y: 0};
                const sx = wx(pos.x), sy = wy(pos.y);
                if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
                    g[sy][sx] = '@';
                }
            });
            
            // Build output
            let out = '<span style="color:#666">┌' + '─'.repeat(W) + '┐</span>\n';
            for (let y = 0; y < H; y++) {
                out += '<span style="color:#666">│</span>';
                for (let x = 0; x < W; x++) {
                    const c = g[y][x];
                    if (c === '~') out += '<span style="color:#00aaff">' + c + '</span>';
                    else if (c === 'T') out += '<span style="color:#00ff00">' + c + '</span>';
                    else if (c === '*') out += '<span style="color:#ffaa00">' + c + '</span>';
                    else if (c === '@') out += '<span style="color:#ff66ff">' + c + '</span>';
                    else out += c;
                }
                out += '<span style="color:#666">│</span>\n';
            }
            out += '<span style="color:#666">└' + '─'.repeat(W) + '┘</span>';
            
            document.getElementById('game').innerHTML = out;
        }
        
        // Start polling
        poll();
        setInterval(poll, 1000);
    </script>
</body>
</html>
