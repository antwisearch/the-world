<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The World - Dwarf Fortress Style</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            color: #ccc;
            font-family: 'Courier New', monospace;
            padding: 10px;
            font-size: 14px;
        }
        #game {
            background: #0a0a0a;
            padding: 10px;
            border: 1px solid #333;
            display: inline-block;
        }
        .header {
            padding: 10px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
        }
        .title { color: #ffaa00; font-size: 20px; }
        .subtitle { color: #666; font-size: 12px; }
        .main { display: flex; gap: 20px; }
        .sidebar {
            width: 250px;
            vertical-align: top;
        }
        .stat-box {
            background: #111;
            padding: 8px;
            margin-bottom: 8px;
            border: 1px solid #333;
        }
        .stat-label { color: #666; font-size: 10px; }
        .stat-value { color: #ccc; }
        .events {
            height: 300px;
            overflow-y: auto;
            font-size: 11px;
        }
        .event { color: #555; margin: 2px 0; }
        .event.birth { color: #0f0; }
        .event.death { color: #f00; }
        .event.build { color: #0ff; }
    </style>
</head>
<body>
    <div class="header">
        <span class="title">⛏️ THE WORLD</span>
        <span class="subtitle"> - A Dwarf Fortress Style Colony Simulation</span>
    </div>
    <div class="main">
        <div id="game"></div>
        <div class="sidebar">
            <div class="stat-box">
                <div class="stat-label">Population</div>
                <div class="stat-value" id="pop">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Generation</div>
                <div class="stat-value" id="gen">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Avg Happiness</div>
                <div class="stat-value" id="hap">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Jobs Done</div>
                <div class="stat-value" id="jobs">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Workers</div>
                <div class="stat-value" id="workers"></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Event Log</div>
                <div class="events" id="events"></div>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            update(data);
        };
        
        function update(data) {
            const civ = data.civilization || {};
            const world = data.world || {};
            const agents = data.agents || [];
            
            // Stats
            document.getElementById('pop').textContent = civ.population || 0;
            document.getElementById('gen').textContent = civ.generation || 1;
            document.getElementById('hap').textContent = (civ.avg_happiness || 0).toFixed(1);
            document.getElementById('jobs').textContent = civ.total_jobs_done || 0;
            
            // Workers
            const jobs = civ.jobs || {};
            document.getElementById('workers').textContent = Object.entries(jobs).map(([j,c]) => j[0].toUpperCase()+':'+c).join(' ') || 'none';
            
            // Events
            const events = world.events || [];
            let eventsHtml = events.slice(-15).reverse().map(e => {
                let cls = 'event';
                if (e.message.includes('Born') || e.message.includes('arrival')) cls += ' birth';
                else if (e.message.includes('died')) cls += ' death';
                else if (e.message.includes('built')) cls += ' build';
                return `<div class="${cls}">${e.message}</div>`;
            }).join('');
            document.getElementById('events').innerHTML = eventsHtml;
            
            render(data);
        }
        
        function render(data) {
            const W = 80, H = 25;
            const world = data.world || {};
            const agents = data.agents || [];
            const resources = world.resources || [];
            const buildings = world.buildings || [];
            const water = world.water_sources || [];
            
            // Grid
            let g = [];
            for (let y = 0; y < H; y++) {
                g[y] = Array(W).fill('.');
            }
            
            const wx = x => Math.floor(x / 1200 * W);
            const wy = y => Math.floor((800 - y) / 800 * H);
            
            // Terrain
            water.forEach(w => {
                for (let dy = -4; dy <= 4; dy++) {
                    for (let dx = -8; dx <= 8; dx++) {
                        const sx = wx(w.x) + dx;
                        const sy = wy(w.y) + dy;
                        if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
                            if (dx*dx + dy*dy < 20) g[sy][sx] = '~';
                        }
                    }
                }
            });
            
            // Resources
            resources.forEach(r => {
                const sx = wx(r.x);
                const sy = wy(r.y);
                if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
                    g[sy][sx] = r.type === 'food' ? '*' : 
                                 r.type === 'wood' ? 'T' : 
                                 r.type === 'stone' ? 'O' : '#';
                }
            });
            
            // Buildings  
            buildings.forEach(b => {
                const sx = wx(b.x);
                const sy = wy(b.y);
                if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
                    g[sy][sx] = b.type === 'shelter' ? '█' : 
                                 b.type === 'farm' ? '░' : 
                                 b.type === 'workshop' ? '▤' : '?';
                }
            });
            
            // Agents
            agents.forEach(a => {
                const sx = wx(a.position.x);
                const sy = wy(a.position.y);
                if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
                    g[sy][sx] = a.job === 'hunter' ? 'h' :
                                 a.job === 'builder' ? 'b' :
                                 a.job === 'farmer' ? 'f' :
                                 a.job === 'trader' ? 't' :
                                 a.job === 'guard' ? 'G' : '@';
                }
            });
            
            // Border
            let out = '┌' + '─'.repeat(W) + '┐\n';
            for (let y = 0; y < H; y++) {
                out += '│' + g[y].join('') + '│\n';
            }
            out += '└' + '─'.repeat(W) + '┘';
            
            document.getElementById('game').textContent = out;
        }
        
        ws.onclose = () => {
            document.getElementById('game').textContent = 'DISCONNECTED';
        };
    </script>
</body>
</html>
